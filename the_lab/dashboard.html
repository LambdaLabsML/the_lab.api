            });
          }
        }

        logEntries.sort((a, b) => (b.time || '').localeCompare(a.time || ''));
        renderLog();
      })
      .catch(() => {});
  }

  function renderLog() {
    // Get active filters
    const filters = {};
    document.querySelectorAll('#log-filters input[data-filter]').forEach(cb => {
      filters[cb.dataset.filter] = cb.checked;
    });

    const container = document.getElementById('log-entries');
    let html = '';
    for (const entry of logEntries) {
      if (!filters[entry.type] && filters[entry.type] !== undefined) continue;
      // For experiment types, check the 'experiment' filter
      if (entry.type === 'experiment' && !filters['experiment']) continue;

      const statusClass = entry.status ? ' status-' + entry.status : '';
      html += '<div class="log-entry type-' + entry.type + statusClass + '">';
      html += '<div class="log-header">';
      html += '<span class="log-time">' + formatTime(entry.time) + '</span>';
      html += '<span class="log-type">' + escapeHtml(entry.title) + '</span>';
      html += '<span class="log-idea">idea #' + entry.ideaId + '</span>';
      html += '</div>';
      html += '<div class="log-body">' + escapeHtml(entry.body) + '</div>';
      if (entry.metrics && Object.keys(entry.metrics).length) {
        html += '<div class="log-metrics">metrics: ' + escapeHtml(JSON.stringify(entry.metrics)) + '</div>';
      }
      if (entry.runtime) {
        html += '<div class="log-metrics">runtime: ' + entry.runtime + '</div>';
      }
      if (entry.extra) {
        html += '<div class="log-body" style="color:#58a6ff;margin-top:3px">' + escapeHtml(entry.extra) + '</div>';
      }
      html += '</div>';
    }
    container.innerHTML = html || '<div style="padding:20px;color:#484f58">No log entries yet.</div>';
  }

  // Filter checkboxes trigger re-render
  document.querySelectorAll('#log-filters input[data-filter]').forEach(cb => {
    cb.addEventListener('change', renderLog);
  });

  // --- Polling ---

  function pollBacklog() { fetch('/api/v1/backlog').then(r => r.json()).then(updateBacklog).catch(() => {}); }
  function pollGraph() { fetch('/api/v1/graph').then(r => r.json()).then(updateGraph).catch(() => {}); }

  // Init
  pollBacklog();
  pollGraph();
  loadChartData();
  setInterval(pollBacklog, 10000);
  setInterval(pollGraph, 15000);
  setInterval(function() { if (chartOpen) loadChartData(); }, 30000);
  setInterval(function() { if (currentView === 'log') loadLog(); }, 15000);

  // --- API Explorer ---

  var API_TAG_ORDER = [
    'orientation', 'ideas', 'experiments', 'monitoring', 'comparison', 'lifecycle', 'other'
  ];

  function classifyEndpoint(method, path, summary) {
    var s = (summary || '').toLowerCase();
    var p = path.toLowerCase();
    if (p === '/api/v1/digest' || p === '/api/v1/backlog' || p === '/api/v1/graph') return 'orientation';
    if (p.match(/\/experiments\/.*\/(progress|log|timeseries)/)) return 'monitoring';
    if (p.match(/\/experiments\/compare/) || p.match(/compare-curves/)) return 'comparison';
    if (p.match(/\/experiments\/.*\/(start|restart|cancel)/) || (method === 'post' && p.match(/\/experiments\//))) return 'lifecycle';
    if (p.match(/\/experiments/)) return 'experiments';
    if (p.match(/\/ideas/)) return 'ideas';
    if (p === '/api/v1/wait') return 'lifecycle';
    return 'other';
  }

  var TAG_LABELS = {
    orientation: 'Orientation',
    ideas: 'Ideas',
    experiments: 'Experiments',
    monitoring: 'Monitoring',
    comparison: 'Comparison',
    lifecycle: 'Lifecycle',
    other: 'Other',
  };

  function loadApiSpec() {
    fetch('/openapi.json').then(function(r) { return r.json(); }).then(function(spec) {
      _apiSpec = spec;
      _apiLoaded = true;
      renderApiList(spec);
    });
  }

  function resolveSchema(schema, spec) {
    if (!schema) return null;
    if (schema['$ref']) {
      var parts = schema['$ref'].split('/');
      var resolved = spec;
      for (var i = 1; i < parts.length; i++) resolved = resolved[parts[i]];
      return resolved;
    }
    return schema;
  }

  function buildExampleFromSchema(schema, spec, depth) {
    if (!schema) return '';
    depth = depth || 0;
    if (depth > 4) return '...';
    schema = resolveSchema(schema, spec);
    if (!schema) return '';
    if (schema.type === 'object' || schema.properties) {
      var obj = {};
      var props = schema.properties || {};
      for (var k in props) {
        obj[k] = buildExampleFromSchema(props[k], spec, depth + 1);
      }
      return obj;
    }
    if (schema.type === 'array') {
      return [buildExampleFromSchema(schema.items, spec, depth + 1)];
    }
    if (schema.enum) return schema.enum[0];
    if (schema.default !== undefined) return schema.default;
    var t = schema.type;
    if (t === 'string') return '';
    if (t === 'integer') return 0;
    if (t === 'number') return 0.0;
    if (t === 'boolean') return false;
    return null;
  }

  function renderApiList(spec) {
    var groups = {};
    var paths = spec.paths || {};
    for (var path in paths) {
      if (path === '/' || path === '/openapi.json') continue;
      var methods = paths[path];
      for (var method in methods) {
        if (method === 'parameters') continue;
        var op = methods[method];
        var tag = classifyEndpoint(method, path, op.summary || op.operationId || '');
        if (!groups[tag]) groups[tag] = [];
        groups[tag].push({ method: method.toUpperCase(), path: path, op: op });
      }
    }

    var html = '';
    for (var ti = 0; ti < API_TAG_ORDER.length; ti++) {
      var tag = API_TAG_ORDER[ti];
      var items = groups[tag];
      if (!items || items.length === 0) continue;
      html += '<div class="api-group"><div class="api-group-title">' + escapeHtml(TAG_LABELS[tag] || tag) + '</div>';
      for (var i = 0; i < items.length; i++) {
        var ep = items[i];
        var desc = ep.op.summary || ep.op.operationId || '';
        html += '<div class="api-row" data-path="' + escapeHtml(ep.path) + '" data-method="' + ep.method
          + '" onclick="selectApiEndpoint(this)">'
          + '<span class="api-method ' + ep.method.toLowerCase() + '">' + ep.method + '</span>'
          + '<span class="api-path">' + escapeHtml(ep.path) + '</span>'
          + (desc ? '<span class="api-desc">' + escapeHtml(desc) + '</span>' : '')
          + '</div>';
      }
      html += '</div>';
    }
    document.getElementById('api-list').innerHTML = html;
  }

  window.selectApiEndpoint = function(el) {
    document.querySelectorAll('.api-row').forEach(function(r) { r.classList.remove('active'); });
    el.classList.add('active');

    var path = el.dataset.path;
    var method = el.dataset.method;
    var spec = _apiSpec;
    var op = spec.paths[path][method.toLowerCase()];

    document.getElementById('api-detail-method').className = 'api-method ' + method.toLowerCase();
    document.getElementById('api-detail-method').textContent = method;
    document.getElementById('api-detail-url').textContent = path;
    document.getElementById('api-detail').dataset.hasContent = '1';
    document.getElementById('api-detail').classList.add('open');

    // Build param inputs
    var paramsHtml = '';
    var params = op.parameters || [];
    // Path params
    var pathParams = params.filter(function(p) { return p.in === 'path'; });
    for (var i = 0; i < pathParams.length; i++) {
      var pp = pathParams[i];
      paramsHtml += '<label>' + escapeHtml(pp.name) + ' <span style="color:#f85149">*</span></label>'
        + '<input type="text" class="api-param" data-name="' + escapeHtml(pp.name) + '" data-in="path" placeholder="' + (pp.schema && pp.schema.type || '') + '">';
    }
    // Query params
    var queryParams = params.filter(function(p) { return p.in === 'query'; });
    for (var i = 0; i < queryParams.length; i++) {
      var qp = queryParams[i];
      var defVal = qp.schema && qp.schema.default !== undefined ? qp.schema.default : '';
      paramsHtml += '<label>' + escapeHtml(qp.name) + (qp.required ? ' <span style="color:#f85149">*</span>' : '') + '</label>'
        + '<input type="text" class="api-param" data-name="' + escapeHtml(qp.name) + '" data-in="query" value="' + escapeHtml(String(defVal)) + '" placeholder="' + (qp.schema && qp.schema.type || '') + '">';
    }
    // Request body
    if (op.requestBody) {
      var content = op.requestBody.content;
      var jsonSchema = content && content['application/json'] && content['application/json'].schema;
      var example = jsonSchema ? JSON.stringify(buildExampleFromSchema(jsonSchema, spec, 0), null, 2) : '{}';
      paramsHtml += '<label>Body (JSON)</label><textarea class="api-param" data-name="_body" data-in="body">' + escapeHtml(example) + '</textarea>';
    }

    if (paramsHtml) {
      paramsHtml += '<div style="margin-top:6px"><button id="api-send-btn" onclick="sendApiRequest()">Send</button></div>';
    } else {
      paramsHtml = '<div style="margin-top:2px"><button id="api-send-btn" onclick="sendApiRequest()">Send</button></div>';
    }
    var paramsEl = document.getElementById('api-params');
    paramsEl.innerHTML = paramsHtml;
    paramsEl.className = paramsHtml ? 'has-params' : '';
    document.getElementById('api-response-status').textContent = '';
    document.getElementById('api-response-status').className = '';
    document.getElementById('api-response-body').innerHTML = '';
  };

  window.sendApiRequest = function() {
    var methodEl = document.getElementById('api-detail-method');
    var method = methodEl.textContent;
    var path = document.getElementById('api-detail-url').textContent;
    var btn = document.getElementById('api-send-btn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    // Collect params
    var inputs = document.querySelectorAll('#api-params .api-param');
    var resolvedPath = path;
    var query = [];
    var body = null;
    inputs.forEach(function(inp) {
      var name = inp.dataset.name;
      var loc = inp.dataset.in;
      var val = inp.value.trim();
      if (loc === 'path' && val) {
        resolvedPath = resolvedPath.replace('{' + name + '}', encodeURIComponent(val));
      } else if (loc === 'query' && val) {
        query.push(encodeURIComponent(name) + '=' + encodeURIComponent(val));
      } else if (loc === 'body' && val) {
        body = val;
      }
    });

    var url = resolvedPath + (query.length ? '?' + query.join('&') : '');
    var opts = { method: method, headers: {} };
    if (body && (method === 'POST' || method === 'PUT' || method === 'PATCH')) {
      opts.headers['Content-Type'] = 'application/json';
      opts.body = body;
    }

    var t0 = performance.now();
    fetch(url, opts).then(function(r) {
      var elapsed = Math.round(performance.now() - t0);
      var statusEl = document.getElementById('api-response-status');
      statusEl.textContent = r.status + ' ' + r.statusText + '  (' + elapsed + 'ms)';
      statusEl.className = r.ok ? 'ok' : 'err';
      return r.text();
    }).then(function(text) {
      try {
        var obj = JSON.parse(text);
        document.getElementById('api-response-body').innerHTML = syntaxHighlight(JSON.stringify(obj, null, 2));
      } catch(e) {
        document.getElementById('api-response-body').textContent = text;
      }
    }).catch(function(err) {
      document.getElementById('api-response-status').textContent = 'Error';
      document.getElementById('api-response-status').className = 'err';
      document.getElementById('api-response-body').textContent = err.toString();
    }).finally(function() {
      btn.disabled = false;
      btn.textContent = 'Send';
    });
  };

  function syntaxHighlight(json) {
    json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    return json.replace(
      /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
      function(match) {
        var cls = 'color:#d2a8ff';  // number
        if (/^"/.test(match)) {
          if (/:$/.test(match)) {
            cls = 'color:#79c0ff';  // key
          } else {
            cls = 'color:#a5d6a7';  // string
          }
        } else if (/true|false/.test(match)) {
          cls = 'color:#d29922';  // boolean
        } else if (/null/.test(match)) {
          cls = 'color:#8b949e';  // null
        }
        return '<span style="' + cls + '">' + match + '</span>';
      }
    );
  }

  window.closeApiDetail = function() {
    document.getElementById('api-detail').classList.remove('open');
    document.getElementById('api-detail').dataset.hasContent = '0';
  };
})();
</script>
</body>
</html>
