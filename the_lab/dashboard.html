<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Lab — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: #0d1117;
    color: #c9d1d9;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #topbar {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-shrink: 0;
    font-size: 13px;
    flex-wrap: wrap;
  }
  #topbar .title { font-size: 15px; font-weight: 700; color: #58a6ff; margin-right: 12px; }
  #topbar .stat { color: #8b949e; }
  #topbar .stat b { color: #c9d1d9; font-weight: 600; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .badge-active { background: #0f5323; color: #3fb950; }
  .badge-concluded { background: #0c2d6b; color: #58a6ff; }
  .badge-abandoned { background: #5a1e23; color: #f85149; }
  .badge-running { background: #2d1a00; color: #d29922; }
  .badge-pending { background: #1c1d1f; color: #8b949e; }
  .badge-completed { background: #0f5323; color: #3fb950; }
  .badge-failed { background: #5a1e23; color: #f85149; }
  .badge-cancelled { background: #1c1d1f; color: #8b949e; }

  #chart-toggle {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 6px 20px;
    cursor: pointer;
    font-size: 12px;
    color: #8b949e;
    flex-shrink: 0;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #chart-toggle:hover { color: #c9d1d9; }
  #chart-toggle .arrow { transition: transform 0.2s; display: inline-block; }
  #chart-toggle .arrow.open { transform: rotate(90deg); }
  #chart-panel {
    background: #0d1117;
    border-bottom: 1px solid #30363d;
    overflow: hidden;
    flex-shrink: 0;
  }
  #chart-panel.collapsed { display: none; }
  #chart-wrap { position: relative; height: 220px; padding: 0 20px 12px 20px; overflow-x: auto; }
  #chart-inner { position: relative; height: 100%; min-width: 100%; }
  #metric-selector {
    padding: 8px 20px 0 20px;
    font-size: 11px;
    color: #8b949e;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  #metric-selector select {
    background: #161b22; color: #c9d1d9; border: 1px solid #30363d;
    padding: 2px 6px; font-family: inherit; font-size: 11px; border-radius: 4px;
  }

  #view-tabs {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 0 20px;
    display: flex;
    gap: 0;
    flex-shrink: 0;
  }
  .view-tab {
    padding: 8px 16px;
    font-size: 12px;
    color: #8b949e;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    user-select: none;
  }
  .view-tab:hover { color: #c9d1d9; }
  .view-tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }

  #main { display: flex; flex: 1; overflow: hidden; }
  #graph-container { flex: 1; position: relative; overflow: auto; }
  #graph { position: relative; min-height: 100%; }
  #timeline-container { flex: 1; position: relative; display: none; overflow: auto; padding: 16px; }
  #timeline-container.active { display: block; }
  #timeline-wrap { position: relative; min-height: 200px; }

  #detail-panel {
    width: 420px;
    max-width: 100vw;
    background: #161b22;
    border-left: 1px solid #30363d;
    overflow-y: auto;
    flex-shrink: 0;
    display: none;
    padding: 16px;
    font-size: 13px;
  }
  #detail-panel.open { display: block; }
  #detail-panel h2 {
    font-size: 15px; color: #58a6ff; margin-bottom: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  #detail-panel h2 .close-btn { cursor: pointer; color: #8b949e; font-size: 18px; line-height: 1; }
  #detail-panel h2 .close-btn:hover { color: #c9d1d9; }
  .detail-section { margin-bottom: 14px; }
  .detail-section .label { font-size: 11px; text-transform: uppercase; color: #8b949e; margin-bottom: 4px; letter-spacing: 0.5px; }
  .detail-section .value { color: #c9d1d9; line-height: 1.5; word-break: break-word; }
  .note-item { padding: 6px 8px; margin-bottom: 4px; border-radius: 4px; border-left: 3px solid #30363d; background: #0d1117; font-size: 12px; }
  .note-item.insight { border-left-color: #58a6ff; }
  .note-item.milestone { border-left-color: #d29922; }
  .note-item.observation { border-left-color: #8b949e; }
  .note-item.debug { border-left-color: #f85149; }
  .note-item .note-meta { font-size: 10px; color: #8b949e; margin-bottom: 2px; }
  .exp-item { padding: 8px; margin-bottom: 6px; border-radius: 4px; background: #0d1117; border: 1px solid #30363d; }
  .exp-item .exp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .exp-item .exp-id { font-weight: 600; color: #58a6ff; font-size: 12px; }
  .exp-item .exp-desc { margin-bottom: 4px; line-height: 1.4; }
  .exp-item .exp-meta { font-size: 11px; color: #8b949e; }
  .exp-item .exp-metrics { font-size: 11px; color: #d2a8ff; margin-top: 3px; }
  .exp-item .exp-timestamps { font-size: 10px; color: #484f58; margin-top: 3px; }
  .exp-item .exp-progress { font-size: 11px; color: #d29922; margin-top: 4px; padding: 4px 6px; background: #1c1d1f; border-radius: 3px; }
  .exp-item .exp-progress .progress-bar { height: 4px; background: #30363d; border-radius: 2px; margin-top: 4px; overflow: hidden; }
  .exp-item .exp-progress .progress-fill { height: 100%; background: #d29922; border-radius: 2px; transition: width 0.3s; }
  .subway-station {
    position: absolute;
    padding: 4px 10px;
    background: #161b22;
    border: 2px solid #30363d;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.15s;
    white-space: nowrap;
    z-index: 1;
  }
  .subway-station:hover, .subway-station.highlighted { background: #1c2333; }
  .subway-station.highlighted { box-shadow: 0 0 0 2px #58a6ff; z-index: 3; }
  .subway-station.dimmed { opacity: 0.3; }
  .subway-station .subway-header { display: flex; align-items: center; gap: 6px; }
  .subway-station .subway-id { font-weight: 700; color: #58a6ff; font-size: 11px; }
  .subway-station .subway-desc { color: #c9d1d9; font-size: 12px; display: inline; margin-left: 6px; }
  .subway-svg { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 0; }

  #log-container { flex: 1; display: none; overflow-y: auto; padding: 0; flex-direction: column; }
  #log-container.active { display: flex; }

  #api-container { flex: 1; display: none; overflow-y: auto; padding: 16px; min-width: 0; }
  #api-container.active { display: block; }
  .api-group { margin-bottom: 20px; }
  .api-group-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    color: #8b949e; margin-bottom: 8px; padding-bottom: 4px;
    border-bottom: 1px solid #21262d;
  }
  .api-row {
    display: flex; align-items: center; gap: 8px; padding: 5px 8px;
    border-radius: 4px; cursor: pointer; font-size: 12px;
    margin-bottom: 2px;
  }
  .api-row:hover { background: #161b22; }
  .api-row.active { background: #1c2333; }
  .api-method {
    font-weight: 700; font-size: 10px; padding: 1px 6px;
    border-radius: 3px; min-width: 38px; text-align: center;
    flex-shrink: 0;
  }
  .api-method.get { background: #0f5323; color: #3fb950; }
  .api-method.post { background: #2d1a00; color: #d29922; }
  .api-path { color: #c9d1d9; }
  .api-desc { color: #8b949e; margin-left: auto; font-size: 11px; white-space: nowrap; }
  #api-detail {
    flex-shrink: 0; width: 55%; max-width: 700px; min-width: 300px;
    background: #161b22; border-left: 1px solid #30363d;
    display: none; flex-direction: column; overflow: hidden;
  }
  #api-detail.open { display: flex; }
  #api-detail-header {
    padding: 10px 16px; border-bottom: 1px solid #30363d;
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  #api-detail-header .close-btn {
    cursor: pointer; color: #8b949e; font-size: 18px; line-height: 1; margin-left: auto;
  }
  #api-detail-header .close-btn:hover { color: #c9d1d9; }
  #api-detail-url {
    font-size: 12px; color: #c9d1d9; font-family: inherit; word-break: break-all;
  }
  #api-params {
    padding: 8px 16px; border-bottom: 1px solid #21262d; flex-shrink: 0;
    display: none;
  }
  #api-params.has-params { display: block; }
  #api-params label { font-size: 11px; color: #8b949e; display: block; margin-bottom: 2px; }
  #api-params input, #api-params textarea {
    background: #0d1117; color: #c9d1d9; border: 1px solid #30363d;
    border-radius: 4px; padding: 4px 8px; font-family: inherit;
    font-size: 12px; width: 100%; margin-bottom: 6px;
  }
  #api-params textarea { min-height: 80px; resize: vertical; }
  #api-send-btn {
    background: #238636; color: #fff; border: none; border-radius: 4px;
    padding: 4px 14px; font-family: inherit; font-size: 12px;
    cursor: pointer; font-weight: 600;
  }
  #api-send-btn:hover { background: #2ea043; }
  #api-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  #api-response {
    flex: 1; overflow: auto; padding: 12px 16px;
  }
  #api-response-status {
    font-size: 11px; margin-bottom: 8px; padding: 4px 8px;
    border-radius: 4px; display: inline-block;
  }
  #api-response-status.ok { background: #0f5323; color: #3fb950; }
  #api-response-status.err { background: #5a1e23; color: #f85149; }
  #api-response-body {
    background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
    padding: 10px; font-size: 11px; white-space: pre-wrap;
    word-break: break-word; overflow: auto; max-height: 100%;
    color: #c9d1d9; line-height: 1.5;
  }
  #log-filters {
    padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d;
    display: flex; gap: 12px; flex-wrap: wrap; align-items: center; font-size: 11px; flex-shrink: 0;
  }
  #log-filters label { cursor: pointer; display: flex; align-items: center; gap: 4px; }
  #log-filters .filter-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  #log-entries { flex: 1; overflow-y: auto; padding: 8px 16px; }
  .log-entry {
    padding: 8px 10px; margin-bottom: 4px; border-radius: 4px;
    border-left: 3px solid #30363d; background: #161b22; font-size: 12px;
  }
  .log-entry .log-time { font-size: 10px; color: #484f58; margin-right: 8px; }
  .log-entry .log-type { font-size: 10px; font-weight: 600; margin-right: 6px; }
  .log-entry .log-idea { font-size: 10px; color: #8b949e; }
  .log-entry .log-header { margin-bottom: 3px; display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
  .log-entry .log-body { color: #c9d1d9; line-height: 1.4; }
  .log-entry .log-metrics { font-size: 11px; color: #d2a8ff; margin-top: 3px; }
  .log-entry.type-idea { border-left-color: #58a6ff; }
  .log-entry.type-idea .log-type { color: #58a6ff; }
  .log-entry.type-experiment { border-left-color: #3fb950; }
  .log-entry.type-experiment .log-type { color: #3fb950; }
  .log-entry.type-experiment.status-failed { border-left-color: #f85149; }
  .log-entry.type-experiment.status-failed .log-type { color: #f85149; }
  .log-entry.type-experiment.status-running { border-left-color: #d29922; }
  .log-entry.type-experiment.status-running .log-type { color: #d29922; }
  .log-entry.type-note-insight { border-left-color: #58a6ff; }
  .log-entry.type-note-insight .log-type { color: #58a6ff; }
  .log-entry.type-note-milestone { border-left-color: #d29922; }
  .log-entry.type-note-milestone .log-type { color: #d29922; }
  .log-entry.type-note-observation { border-left-color: #8b949e; }
  .log-entry.type-note-observation .log-type { color: #8b949e; }
  .log-entry.type-note-debug { border-left-color: #f85149; }
  .log-entry.type-note-debug .log-type { color: #f85149; }

  /* Mobile: detail panel as overlay */
  @media (max-width: 800px) {
    #detail-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 100vw;
      z-index: 100;
      border-left: none;
    }
    #topbar { gap: 12px; padding: 8px 12px; font-size: 12px; }
    #topbar .title { font-size: 13px; margin-right: 4px; }
  }

  .badge-suggested { background: #2d1a00; color: #d29922; }

  #suggest-toggle {
    background: #161b22;
    border-bottom: 1px solid #30363d;
    padding: 6px 20px;
    cursor: pointer;
    font-size: 12px;
    color: #8b949e;
    flex-shrink: 0;
    user-select: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #suggest-toggle:hover { color: #c9d1d9; }
  #suggest-toggle .arrow { transition: transform 0.2s; display: inline-block; }
  #suggest-toggle .arrow.open { transform: rotate(90deg); }
  #suggest-panel {
    background: #0d1117;
    border-bottom: 1px solid #30363d;
    overflow: hidden;
    flex-shrink: 0;
    padding: 16px 20px;
  }
  #suggest-panel.collapsed { display: none; }
  #suggest-panel .suggest-form { max-width: 600px; }
  #suggest-panel textarea,
  #suggest-panel input[type="text"],
  #suggest-panel input[type="url"],
  #suggest-panel select {
    background: #161b22; color: #c9d1d9; border: 1px solid #30363d;
    border-radius: 4px; padding: 6px 10px; font-family: inherit;
    font-size: 12px; width: 100%;
  }
  #suggest-panel textarea { min-height: 60px; resize: vertical; }
  #suggest-panel .form-group { margin-bottom: 10px; }
  #suggest-panel .form-label {
    display: block; font-size: 11px; color: #8b949e;
    text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px;
  }
  #suggest-panel .priority-group { display: flex; gap: 16px; align-items: center; }
  #suggest-panel .priority-group label {
    display: flex; align-items: center; gap: 4px;
    font-size: 12px; color: #c9d1d9; cursor: pointer;
  }
  .link-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .link-row input { flex: 1; }
  .remove-link-btn {
    background: none; border: none; color: #f85149; cursor: pointer;
    font-size: 16px; padding: 0 4px; line-height: 1;
  }
  .remove-link-btn:hover { color: #ff7b72; }
  .suggest-btn {
    background: #238636; color: #ffffff; border: none; border-radius: 4px;
    padding: 6px 16px; font-family: inherit; font-size: 12px;
    cursor: pointer; font-weight: 600;
  }
  .suggest-btn:hover { background: #2ea043; }
  .suggest-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .add-link-btn {
    background: none; border: 1px solid #30363d; color: #8b949e;
    border-radius: 4px; padding: 3px 10px; font-family: inherit;
    font-size: 11px; cursor: pointer;
  }
  .add-link-btn:hover { color: #c9d1d9; border-color: #8b949e; }
  .suggest-msg {
    font-size: 12px; margin-top: 8px; padding: 6px 10px;
    border-radius: 4px; display: none;
  }
  .suggest-msg.success { display: block; background: #0f5323; color: #3fb950; }
  .suggest-msg.error { display: block; background: #5a1e23; color: #f85149; }

  .resource-chip {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 500; background: #161b22;
    border: 1px solid #30363d; color: #58a6ff; text-decoration: none;
    margin-right: 4px; margin-top: 3px;
  }
  .resource-chip:hover { background: #1c2333; border-color: #58a6ff; }

  .attach-link-btn {
    background: none; border: 1px solid #30363d; color: #8b949e;
    border-radius: 4px; padding: 3px 10px; font-family: inherit;
    font-size: 11px; cursor: pointer; margin-top: 8px;
  }
  .attach-link-btn:hover { color: #c9d1d9; border-color: #8b949e; }
  .attach-form {
    margin-top: 8px; padding: 10px; background: #0d1117;
    border: 1px solid #30363d; border-radius: 4px;
  }
  .attach-form input {
    background: #161b22; color: #c9d1d9; border: 1px solid #30363d;
    border-radius: 4px; padding: 4px 8px; font-family: inherit;
    font-size: 12px; width: 100%; margin-bottom: 6px;
  }
  .attach-form .attach-actions { display: flex; gap: 8px; }

  .training-chart-wrap { margin-top: 6px; height: 150px; position: relative; }

  .tag-pill {
    display: inline-block; padding: 1px 7px; border-radius: 10px;
    font-size: 10px; font-weight: 600; background: #0c2d6b;
    color: #388bfd; margin-right: 4px; margin-top: 2px;
  }
  .tag-toggle {
    display: inline-block; padding: 2px 8px; border-radius: 10px;
    font-size: 10px; font-weight: 600; background: #161b22;
    border: 1px solid #30363d; color: #8b949e; cursor: pointer;
    user-select: none; transition: all 0.15s;
  }
  .tag-toggle:hover { border-color: #8b949e; color: #c9d1d9; }
  .tag-toggle.active { background: #0c2d6b; border-color: #388bfd; color: #388bfd; }
  .tag-rename-input {
    background: #0d1117; color: #c9d1d9; border: 1px solid #388bfd;
    border-radius: 10px; padding: 2px 8px; font-family: inherit;
    font-size: 10px; font-weight: 600; width: 90px; outline: none;
  }
</style>
</head>
<body>
  <div id="topbar">
    <span class="title">The Lab</span>
    <span class="stat">Active ideas: <b id="stat-ideas">--</b></span>
    <span class="stat">Running: <b id="stat-running">--</b></span>
    <span class="stat">Pending: <b id="stat-pending">--</b></span>
    <span class="stat">Branch: <b id="stat-branch">--</b></span>
  </div>
  <div id="chart-toggle" onclick="toggleChart()">
    <span class="arrow open" id="chart-arrow">&#9654;</span> Metrics over time
  </div>
  <div id="chart-panel">
    <div id="metric-selector">
      Metric: <select id="metric-select" onchange="updateChart(); recolorGraph();"></select>
      Color: <select id="color-mode" onchange="updateChart(); recolorGraph();">
        <option value="status+improve" selected>status + metric improvement</option>
        <option value="lane">by lane</option>
        <option value="status">by status</option>
        <option value="improvement">by improvement</option>
        <option value="idea">by idea sequence</option>
      </select>
      <label style="margin-left:12px;cursor:pointer"><input type="checkbox" id="improvements-only" onchange="updateChart()"> improvements only</label>
      <span id="tag-filters" style="display:inline-flex;gap:4px;align-items:center;margin-left:12px;flex-wrap:wrap">Tags:</span>
    </div>
    <div id="chart-wrap"><div id="chart-inner"><canvas id="metrics-chart"></canvas></div></div>
  </div>
  <div id="suggest-toggle" onclick="toggleSuggest()">
    <span class="arrow" id="suggest-arrow">&#9654;</span> Suggest idea
  </div>
  <div id="suggest-panel" class="collapsed">
    <div class="suggest-form">
      <div class="form-group">
        <span class="form-label">Description</span>
        <textarea id="suggest-desc" placeholder="Describe your idea..."></textarea>
      </div>
      <div class="form-group">
        <span class="form-label">Parent idea (optional)</span>
        <select id="suggest-parent"><option value="">None</option></select>
      </div>
      <div class="form-group">
        <span class="form-label">Priority</span>
        <div class="priority-group">
          <label><input type="radio" name="suggest-priority" value="normal" checked> Normal</label>
          <label><input type="radio" name="suggest-priority" value="high"> High</label>
        </div>
      </div>
      <div class="form-group">
        <span class="form-label">Links</span>
        <div id="suggest-links"></div>
        <button type="button" class="add-link-btn" onclick="addLinkRow()">+ Add link</button>
      </div>
      <button class="suggest-btn" onclick="submitIdea()">Submit idea</button>
      <div class="suggest-msg" id="suggest-msg"></div>
    </div>
  </div>
  <div id="view-tabs">
    <div class="view-tab active" data-view="dag" onclick="switchView('dag')">DAG</div>
    <div class="view-tab" data-view="timeline" onclick="switchView('timeline')">Timeline</div>
    <div class="view-tab" data-view="log" onclick="switchView('log')">Log</div>
    <div class="view-tab" data-view="api" onclick="switchView('api')">API</div>
  </div>
  <div id="main">
    <div id="graph-container">
      <div id="graph"></div>
    </div>
    <div id="timeline-container">
      <div id="timeline-wrap"><canvas id="timeline-chart"></canvas></div>
    </div>
    <div id="log-container">
      <div id="log-filters">
        <label><input type="checkbox" data-filter="idea" checked><span class="filter-dot" style="background:#58a6ff"></span> Ideas</label>
        <label><input type="checkbox" data-filter="experiment" checked><span class="filter-dot" style="background:#3fb950"></span> Experiments</label>
        <label><input type="checkbox" data-filter="note-insight" checked><span class="filter-dot" style="background:#58a6ff"></span> Insight</label>
        <label><input type="checkbox" data-filter="note-milestone" checked><span class="filter-dot" style="background:#d29922"></span> Milestone</label>
        <label><input type="checkbox" data-filter="note-observation" checked><span class="filter-dot" style="background:#8b949e"></span> Observation</label>
        <label><input type="checkbox" data-filter="note-debug"><span class="filter-dot" style="background:#f85149"></span> Debug</label>
      </div>
      <div id="log-entries"></div>
    </div>
    <div id="api-container">
      <div id="api-list"></div>
    </div>
    <div id="api-detail">
      <div id="api-detail-header">
        <span id="api-detail-method" class="api-method get">GET</span>
        <span id="api-detail-url"></span>
        <span class="close-btn" onclick="closeApiDetail()">&times;</span>
      </div>
      <div id="api-params"></div>
      <div id="api-response">
        <div id="api-response-status"></div>
        <pre id="api-response-body"></pre>
      </div>
    </div>
    <div id="detail-panel">
      <div id="detail-content"></div>
    </div>
  </div>

<script>
(function() {
  const STATUS_COLORS = {
    active:    { bg: '#238636', border: '#3fb950', font: '#ffffff' },
    running:   { bg: '#6e4b00', border: '#d29922', font: '#ffffff' },
    concluded: { bg: '#1f6feb', border: '#58a6ff', font: '#ffffff' },
    abandoned: { bg: '#da3633', border: '#f85149', font: '#ffffff' },
    suggested: { bg: '#2d1a00', border: '#d29922', font: '#ffffff' },
  };

  const STATUS_BAR_COLORS = {
    active: '#3fb950', running: '#d29922', concluded: '#58a6ff', abandoned: '#f85149', suggested: '#d29922',
  };

  const IDEA_PALETTE = [
    '#58a6ff', '#3fb950', '#d29922', '#f85149', '#d2a8ff',
    '#79c0ff', '#56d364', '#e3b341', '#ff7b72', '#bc8cff',
    '#a5d6ff', '#7ee787', '#e078f0', '#ffa198', '#d8b4fe',
  ];

  let selectedIdea = null;
  let metricsChart = null;
  let timelineChart = null;
  let allExperiments = [];
  let allIdeas = {};
  let chartOpen = true;
  let currentView = 'dag';
  let graphData = null;
  let currentLayout = null;
  let suggestOpen = false;
  let _trainingCharts = {};
  let _apiLoaded = false;
  let _apiSpec = null;
  let _stationSizeCache = {};
  let _activeTagFilters = new Set();

  // --- View switching ---

  window.switchView = function(view) {
    currentView = view;
    document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));
    document.getElementById('graph-container').style.display = view === 'dag' ? '' : 'none';
    document.getElementById('timeline-container').classList.toggle('active', view === 'timeline');
    document.getElementById('log-container').classList.toggle('active', view === 'log');
    document.getElementById('api-container').classList.toggle('active', view === 'api');
    var apiDetail = document.getElementById('api-detail');
    if (view !== 'api') {
      apiDetail.classList.remove('open');
    } else if (apiDetail.dataset.hasContent === '1') {
      apiDetail.classList.add('open');
    }
    if (view === 'timeline' && graphData) updateTimeline(graphData);
    if (view === 'log') loadLog();
    if (view === 'api' && !_apiLoaded) loadApiSpec();
  };

  // --- Subway DAG ---

  function truncate(s, max) { return (!s) ? '' : s.length > max ? s.substring(0, max) + '...' : s; }

  function ideaTitle(s) {
    // Extract a short title: text before the first ':', or before the first
    // non-letter/digit/space symbol if there's no colon.
    if (!s) return '';
    const colonIdx = s.indexOf(':');
    if (colonIdx > 0) return s.substring(0, colonIdx).trim();
    const m = s.match(/^[\w\s]+/);
    return m ? m[0].trim() : s;
  }

  function buildSubwayLayout(data) {
    if (!data.nodes.length) return null;
    const nodeMap = {};
    const childMap = {};
    for (const n of data.nodes) { nodeMap[n.id] = n; childMap[n.id] = []; }
    for (const e of data.edges) { if (childMap[e.from]) childMap[e.from].push(e.to); }

    // Depth = column position (longest path from root)
    const depth = {};
    function getDepth(id) {
      if (depth[id] !== undefined) return depth[id];
      const parents = (nodeMap[id].parent_ids || []).filter(p => nodeMap[p]);
      depth[id] = parents.length ? Math.max(...parents.map(getDepth)) + 1 : 0;
      return depth[id];
    }
    for (const n of data.nodes) getDepth(n.id);

    // Subtree last activity (most-active branch continues parent lane)
    const subAct = {};
    function getSubAct(id) {
      if (subAct[id]) return subAct[id];
      const n = nodeMap[id];
      let best = n.last_finish || n.first_start || n.created_at || '';
      for (const c of childMap[id]) { const ca = getSubAct(c); if (ca > best) best = ca; }
      return (subAct[id] = best);
    }
    for (const n of data.nodes) getSubAct(n.id);

    // Sort children: most-active subtree first (continues parent lane)
    for (const id of Object.keys(childMap))
      childMap[id].sort((a, b) => (getSubAct(b) || '').localeCompare(getSubAct(a) || ''));

    // Assign lanes via DFS + build lane tree for packing
    const lanes = [];
    const ideaLane = {};
    const assigned = new Set();
    const laneChildren = {};  // lane_idx → [{childLane, forkCol}, ...]

    function assign(id, lane) {
      if (assigned.has(id)) return;
      assigned.add(id);
      if (lane < 0) { lane = lanes.length; lanes.push({ ideas: [], lastActivity: '' }); }
      ideaLane[id] = lane;
      lanes[lane].ideas.push(id);
      const act = subAct[id] || '';
      if (act > lanes[lane].lastActivity) lanes[lane].lastActivity = act;
      const ch = childMap[id] || [];
      if (ch.length) {
        assign(ch[0], lane);
        for (let i = 1; i < ch.length; i++) {
          if (assigned.has(ch[i])) continue;  // merge target already placed
          const childLane = lanes.length;
          if (!laneChildren[lane]) laneChildren[lane] = [];
          laneChildren[lane].push({ childLane: childLane, forkCol: depth[id] });
          assign(ch[i], -1);
        }
      }
    }

    const hasParent = new Set(data.edges.map(e => e.to));
    const roots = data.nodes.filter(n => !hasParent.has(n.id)).map(n => n.id);
    roots.sort((a, b) => (getSubAct(b) || '').localeCompare(getSubAct(a) || ''));
    for (const r of roots) assign(r, -1);

    // Compute deepest subtree activity for each lane (includes descendant lanes)
    const laneSubAct = {};
    function getLaneSubAct(li) {
      if (laneSubAct[li]) return laneSubAct[li];
      let best = lanes[li].lastActivity || '';
      for (const c of (laneChildren[li] || [])) {
        const ca = getLaneSubAct(c.childLane);
        if (ca > best) best = ca;
      }
      return (laneSubAct[li] = best);
    }
    for (let li = 0; li < lanes.length; li++) getLaneSubAct(li);

    // Place lanes via DFS of lane tree.
    // At each lane, process forks column-by-column (left → right).
    // Within each column's forks, most recently active subtree placed first
    // (closest to parent row).
    const laneRow = {};
    let nextRow = 0;
    function placeLane(li) {
      laneRow[li] = nextRow++;
      const children = (laneChildren[li] || []).slice();
      children.sort(function(a, b) {
        if (a.forkCol !== b.forkCol) return a.forkCol - b.forkCol;
        // Same column: most recently active subtree first (closest to parent)
        return (getLaneSubAct(b.childLane) || '').localeCompare(getLaneSubAct(a.childLane) || '');
      });
      for (const c of children) placeLane(c.childLane);
    }

    // Find root lanes (no lane-parent) and sort by activity
    const hasLaneParent = new Set();
    for (const ch of Object.values(laneChildren))
      for (const c of ch) hasLaneParent.add(c.childLane);
    const rootLanes = [];
    for (let li = 0; li < lanes.length; li++)
      if (!hasLaneParent.has(li)) rootLanes.push(li);
    rootLanes.sort(function(a, b) {
      return (getLaneSubAct(b) || '').localeCompare(getLaneSubAct(a) || '');
    });
    for (const rl of rootLanes) placeLane(rl);

    return { nodeMap, childMap, depth, ideaLane, laneRow, laneChildren, lanes,
      numLanes: lanes.length, maxDepth: Math.max(0, ...Object.values(depth)) };
  }

  function updateGraph(data) {
    graphData = data;
    for (const n of data.nodes) allIdeas[n.id] = n;

    const layout = buildSubwayLayout(data);
    currentLayout = layout;
    const container = document.getElementById('graph');
    if (!layout) {
      container.innerHTML = '<div style="padding:40px;color:#484f58;text-align:center">No ideas yet</div>';
      if (currentView === 'timeline') updateTimeline(data);
      return;
    }

    // --- Measure station sizes ---
    // Only measure nodes we haven't seen before (or if layout changed).
    // Reuse cached sizes for known nodes to avoid a full DOM reflow.
    const sizes = {};
    const needsMeasure = [];
    for (const n of data.nodes) {
      var key = n.id + ':' + ideaTitle(n.description);
      if (_stationSizeCache[key]) {
        sizes[n.id] = _stationSizeCache[key];
      } else {
        needsMeasure.push(n);
      }
    }
    if (needsMeasure.length > 0) {
      let mHtml = '<div style="position:absolute;visibility:hidden;top:0;left:0">';
      for (const n of needsMeasure) {
        const ds = n.has_running ? 'running' : n.status;
        const sc = STATUS_BAR_COLORS[ds] || STATUS_BAR_COLORS.active;
        const lc = IDEA_PALETTE[layout.ideaLane[n.id] % IDEA_PALETTE.length];
        mHtml += '<div class="subway-station" data-id="' + n.id + '" style="'
          + 'position:static;border-color:' + sc + ';border-left:4px solid ' + lc
          + (n.status === 'suggested' ? ';border-style:dashed' : '') + '">'
          + '<div class="subway-header"><span class="subway-id">#' + n.id + '</span>' + badgeFor(ds)
          + '<span class="subway-desc">' + escapeHtml(ideaTitle(n.description)) + '</span></div>'
          + '</div>';
      }
      mHtml += '</div>';
      container.innerHTML = mHtml;
      container.querySelectorAll('.subway-station').forEach(function(el) {
        const id = parseInt(el.dataset.id);
        const s = { w: el.offsetWidth, h: el.offsetHeight };
        sizes[id] = s;
        var node = data.nodes.find(function(n) { return n.id === id; });
        if (node) _stationSizeCache[id + ':' + ideaTitle(node.description)] = s;
      });
    }

    // --- Compute column gap from max fan-out ---
    const ROUTING_SPACING = 10;
    const branchCounts = {};
    for (const n of data.nodes) {
      for (const pid of (n.parent_ids || [])) {
        if (layout.ideaLane[n.id] !== layout.ideaLane[pid])
          branchCounts[pid] = (branchCounts[pid] || 0) + 1;
      }
    }
    const maxFanOut = Math.max(0, ...Object.values(branchCounts));
    const colGap = Math.max(30, maxFanOut * ROUTING_SPACING + 20);

    // --- Column widths & x-positions ---
    const colWidth = {};
    for (const n of data.nodes) {
      const c = layout.depth[n.id];
      colWidth[c] = Math.max(colWidth[c] || 0, sizes[n.id].w);
    }
    const colX = {};
    var cx = 16;
    for (var c = 0; c <= layout.maxDepth; c++) {
      colX[c] = cx;
      cx += (colWidth[c] || 0) + colGap;
    }
    const totalW = cx + 16;

    // --- Per-column y-packing with pass-through reservations ---
    const ROW_GAP = 3;
    const PAD_Y = 12;
    const PASS_H = 14;  // height reserved for a line passing through without a station

    // Group stations by column, store status on each
    const colNodes = {};
    for (var idx = 0; idx < data.nodes.length; idx++) {
      var n = data.nodes[idx];
      var col = layout.depth[n.id];
      if (!colNodes[col]) colNodes[col] = [];
      colNodes[col].push(n);
    }

    // Compute per-lane SUBTREE activity (includes all descendant lanes via lane tree).
    var laneDirectAct = {};
    for (var idx = 0; idx < data.nodes.length; idx++) {
      var n = data.nodes[idx];
      var li = layout.ideaLane[n.id];
      var act = n.last_finish || n.first_start || n.created_at || '';
      if (!laneDirectAct[li] || act > laneDirectAct[li]) laneDirectAct[li] = act;
    }
    var laneFullAct = {};
    function computeLaneFullAct(li) {
      if (laneFullAct[li] !== undefined) return laneFullAct[li];
      var best = laneDirectAct[li] || '';
      var ch = layout.laneChildren[li];
      if (ch) {
        for (var j = 0; j < ch.length; j++) {
          var ca = computeLaneFullAct(ch[j].childLane);
          if (ca > best) best = ca;
        }
      }
      laneFullAct[li] = best;
      return best;
    }
    for (var li = 0; li < layout.lanes.length; li++) computeLaneFullAct(li);

    // Compute per-lane "worst" status (for sorting: concluded=0, active=1, abandoned=2)
    var STATUS_ORDER = { concluded: 0, active: 1, abandoned: 2, suggested: 3 };
    var laneStatus = {};
    for (var idx = 0; idx < data.nodes.length; idx++) {
      var n = data.nodes[idx];
      var li = layout.ideaLane[n.id];
      var rank = STATUS_ORDER[n.status] !== undefined ? STATUS_ORDER[n.status] : 1;
      if (laneStatus[li] === undefined || rank > laneStatus[li]) laneStatus[li] = rank;
    }

    // Build explicit pass-through set by scanning ALL edges.
    // For every edge (parent→child), if they span >1 column, reserve space
    // in intermediate columns for the child's lane.
    var needsPass = {};
    // a) Same-lane backbone gaps
    for (var li = 0; li < layout.lanes.length; li++) {
      var ideas = layout.lanes[li].ideas;
      if (ideas.length < 2) continue;
      var cols = [];
      for (var j = 0; j < ideas.length; j++) cols.push(layout.depth[ideas[j]]);
      cols.sort(function(a, b) { return a - b; });
      for (var j = 0; j < cols.length - 1; j++) {
        for (var cc = cols[j] + 1; cc < cols[j + 1]; cc++) needsPass[li + ',' + cc] = li;
      }
    }
    // b) Cross-lane edges that skip columns
    for (var idx = 0; idx < data.edges.length; idx++) {
      var e = data.edges[idx];
      var fl = layout.ideaLane[e.from];
      var tl = layout.ideaLane[e.to];
      if (fl === undefined || tl === undefined) continue;
      if (fl === tl) continue;
      var fc = layout.depth[e.from];
      var tc = layout.depth[e.to];
      if (fc === undefined || tc === undefined) continue;
      for (var cc = fc + 1; cc < tc; cc++) {
        needsPass[tl + ',' + cc] = e.to;  // store target node ID
      }
    }

    // Build slots per column: just stations, sorted by status then activity
    var colSlots = {};
    for (var c = 0; c <= layout.maxDepth; c++) {
      var slots = [];
      var nodes = colNodes[c] || [];
      for (var j = 0; j < nodes.length; j++) {
        var n = nodes[j];
        var li = layout.ideaLane[n.id];
        var sr = STATUS_ORDER[n.status] !== undefined ? STATUS_ORDER[n.status] : 1;
        slots.push({ type: 'station', nodeId: n.id, lane: li, h: sizes[n.id].h,
                      statusRank: sr, act: laneFullAct[li] || '' });
      }
      // Sort: 1) status (concluded=0, active=1, abandoned=2)  2) subtree activity desc
      slots.sort(function(a, b) {
        if (a.statusRank !== b.statusRank) return a.statusRank - b.statusRank;
        if (a.act !== b.act) return b.act > a.act ? 1 : -1;
        return 0;
      });
      colSlots[c] = slots;
    }

    // === PASS 1: stack stations without pass-throughs ===
    var stationPos = {};
    var maxY = 0;
    for (var c = 0; c <= layout.maxDepth; c++) {
      var slots = colSlots[c] || [];
      var y = PAD_Y;
      for (var i = 0; i < slots.length; i++) {
        var slot = slots[i];
        var minY = y;
        // Children never above parent
        var pids = (layout.nodeMap[slot.nodeId] || {}).parent_ids || [];
        for (var j = 0; j < pids.length; j++) {
          var pp = stationPos[pids[j]];
          if (pp) minY = Math.max(minY, pp.y);
        }
        y = minY;
        stationPos[slot.nodeId] = { x: colX[c], y: y, w: colWidth[c], h: slot.h };
        y += slot.h + ROW_GAP;
      }
      if (y > maxY) maxY = y;
    }

    // === PASS 2: push stations down where horizontal line segments cross them ===
    // The orthogonal routing draws horizontal segments at the DESTINATION's cy.
    // Only this horizontal portion actually crosses through intermediate columns.
    // Collect the y-level of each horizontal crossing per column.
    var crossings = {};  // col → [cy, cy, ...]
    // a) Same-lane backbone: A(colA) → B(colB) routes horizontally at B.cy
    for (var li = 0; li < layout.lanes.length; li++) {
      var ideas = layout.lanes[li].ideas;
      if (ideas.length < 2) continue;
      var sorted = ideas.slice().sort(function(a, b) { return layout.depth[a] - layout.depth[b]; });
      for (var j = 0; j < sorted.length - 1; j++) {
        var aCol = layout.depth[sorted[j]], bCol = layout.depth[sorted[j + 1]];
        if (bCol <= aCol + 1) continue;
        var bP = stationPos[sorted[j + 1]];
        if (!bP) continue;
        var bCy = bP.y + bP.h / 2;
        for (var cc = aCol + 1; cc < bCol; cc++) {
          if (!crossings[cc]) crossings[cc] = [];
          crossings[cc].push(bCy);
        }
      }
    }
    // b) Cross-lane branch: routes horizontally at child.cy
    for (var idx = 0; idx < data.edges.length; idx++) {
      var e = data.edges[idx];
      var fl = layout.ideaLane[e.from], tl = layout.ideaLane[e.to];
      if (fl === undefined || tl === undefined || fl === tl) continue;
      var fc = layout.depth[e.from], tc = layout.depth[e.to];
      if (fc === undefined || tc === undefined || tc <= fc + 1) continue;
      var cP = stationPos[e.to];
      if (!cP) continue;
      var cCy = cP.y + cP.h / 2;
      for (var cc = fc + 1; cc < tc; cc++) {
        if (!crossings[cc]) crossings[cc] = [];
        crossings[cc].push(cCy);
      }
    }
    // For each column with crossings, check overlap with station boxes and push down
    for (var c = 0; c <= layout.maxDepth; c++) {
      var crs = crossings[c];
      if (!crs || !crs.length) continue;
      crs.sort(function(a, b) { return a - b; });
      // Deduplicate nearby crossings
      var unique = [crs[0]];
      for (var j = 1; j < crs.length; j++) {
        if (crs[j] - unique[unique.length - 1] > 4) unique.push(crs[j]);
      }
      var slots = colSlots[c] || [];
      for (var ci = 0; ci < unique.length; ci++) {
        var lineY = unique[ci];
        var halfH = PASS_H / 2;
        // Find any station that overlaps lineY ± halfH
        for (var j = 0; j < slots.length; j++) {
          var sp = stationPos[slots[j].nodeId];
          if (!sp) continue;
          if (lineY + halfH > sp.y && lineY - halfH < sp.y + sp.h) {
            // Push this station and all below it down
            var pushTo = lineY + halfH + 2;
            var shift = pushTo - sp.y;
            if (shift > 0) {
              for (var k = j; k < slots.length; k++) {
                var sp2 = stationPos[slots[k].nodeId];
                if (!sp2) continue;
                sp2.y += shift;
              }
            }
            break;  // only push once per crossing
          }
        }
      }
    }
    // Recompute maxY after adjustments
    maxY = 0;
    for (var nid in stationPos) {
      var sp = stationPos[nid];
      var bot = sp.y + sp.h + ROW_GAP;
      if (bot > maxY) maxY = bot;
    }
    var totalH = maxY + PAD_Y;

    // --- Render ---
    var colorMode = (document.getElementById('color-mode') || {}).value || 'status+improve';
    var html = '<svg class="subway-svg" id="subway-svg" width="' + totalW + '" height="' + totalH + '"></svg>';
    for (const n of data.nodes) {
      var p = stationPos[n.id];
      if (!p) continue;
      var ds = n.has_running ? 'running' : n.status;
      var nodeColor = _colorForIdea(n.id, colorMode);
      html += '<div class="subway-station" data-id="' + n.id + '" title="' + escapeHtml(n.description) + '" style="'
        + 'left:' + p.x + 'px;top:' + p.y + 'px;width:' + p.w + 'px'
        + ';border-color:' + nodeColor + '">'
        + '<div class="subway-header"><span class="subway-id">#' + n.id + '</span>' + badgeFor(ds)
        + '<span class="subway-desc">' + escapeHtml(ideaTitle(n.description)) + '</span></div>'
        + '</div>';
    }
    container.innerHTML = html;
    container.style.minWidth = totalW + 'px';
    container.style.minHeight = totalH + 'px';

    drawSubwayLines(data, layout, stationPos);

    // --- Hover highlighting ---
    // Build parent map for ancestor traversal
    var parentMap = {};
    for (var idx = 0; idx < data.nodes.length; idx++) {
      var n = data.nodes[idx];
      parentMap[n.id] = (n.parent_ids || []).filter(function(p) { return layout.nodeMap[p]; });
    }

    function getAncestors(ideaId) {
      var ancestors = {};
      var queue = [ideaId];
      while (queue.length) {
        var cur = queue.shift();
        if (ancestors[cur]) continue;
        ancestors[cur] = true;
        var pids = parentMap[cur] || [];
        for (var j = 0; j < pids.length; j++) queue.push(pids[j]);
      }
      return ancestors;
    }

    function highlightIdea(ideaId) {
      var ancestors = ideaId ? getAncestors(ideaId) : null;
      // Highlight/dim stations
      container.querySelectorAll('.subway-station').forEach(function(el) {
        var id = parseInt(el.dataset.id);
        if (!ancestors) { el.classList.remove('highlighted', 'dimmed'); return; }
        if (ancestors[id]) { el.classList.add('highlighted'); el.classList.remove('dimmed'); }
        else { el.classList.add('dimmed'); el.classList.remove('highlighted'); }
      });
      // Highlight/dim SVG edges
      var svg = document.getElementById('subway-svg');
      if (svg) {
        svg.querySelectorAll('.svg-edge').forEach(function(el) {
          var from = parseInt(el.getAttribute('data-from'));
          var to = parseInt(el.getAttribute('data-to'));
          if (!ancestors) { el.style.opacity = ''; el.style.strokeWidth = ''; return; }
          if (ancestors[from] && ancestors[to]) { el.style.opacity = '1'; el.style.strokeWidth = '5'; }
          else { el.style.opacity = '0.1'; el.style.strokeWidth = ''; }
        });
        svg.querySelectorAll('.svg-dot').forEach(function(el) {
          var id = parseInt(el.getAttribute('data-idea'));
          if (!ancestors) { el.style.opacity = ''; return; }
          el.style.opacity = ancestors[id] ? '1' : '0.15';
        });
      }
      // Highlight chart points for this idea
      highlightChartIdea(ideaId);
    }

    function highlightChartIdea(ideaId) {
      if (!metricsChart) return;
      var ds = metricsChart.data.datasets[0];
      if (!ds || !ds._expData) return;
      var radii = [], bw = [];
      for (var j = 0; j < ds._expData.length; j++) {
        var match = ideaId && ds._expData[j].idea_id === ideaId;
        radii.push(match ? 12 : (ds._origRadii ? ds._origRadii[j] : 6));
        bw.push(match ? 4 : (ds._origBW ? ds._origBW[j] : 1));
      }
      if (!ideaId) {
        // Restore originals
        ds.pointRadius = ds._origRadii || radii;
        ds.pointBorderWidth = ds._origBW || bw;
      } else {
        if (!ds._origRadii) { ds._origRadii = ds.pointRadius.slice(); ds._origBW = ds.pointBorderWidth.slice(); }
        ds.pointRadius = radii;
        ds.pointBorderWidth = bw;
      }
      metricsChart.update('none');
    }

    container.querySelectorAll('.subway-station').forEach(function(el) {
      el.addEventListener('click', function() { loadIdeaDetail(parseInt(el.dataset.id)); });
      el.addEventListener('mouseenter', function() { highlightIdea(parseInt(el.dataset.id)); });
      el.addEventListener('mouseleave', function() { highlightIdea(null); });
    });

    // Store highlightIdea globally so the chart can call it
    window._highlightIdea = highlightIdea;

    if (currentView === 'timeline') updateTimeline(data);
  }

  function drawSubwayLines(data, layout, stationPos) {
    const svg = document.getElementById('subway-svg');
    if (!svg) return;

    // Build position map from computed layout
    const pos = {};
    for (const n of data.nodes) {
      const p = stationPos[n.id];
      if (!p) continue;
      pos[n.id] = {
        cx: p.x + p.w / 2,
        cy: p.y + p.h / 2,
        l: p.x,
        r: p.x + p.w,
      };
    }

    let s = '';

    // 1. Lane backbone lines — orthogonal routing between consecutive same-lane stations
    for (let li = 0; li < layout.lanes.length; li++) {
      const lane = layout.lanes[li];
      if (lane.ideas.length < 2) continue;
      const ids = lane.ideas.slice();
      const pts = ids.map(id => pos[id]);
      const color = IDEA_PALETTE[li % IDEA_PALETTE.length];
      for (let i = 0; i < pts.length - 1; i++) {
        if (!pts[i] || !pts[i + 1]) continue;
        const a = pts[i], b = pts[i + 1];
        const edgeAttr = ' data-from="' + ids[i] + '" data-to="' + ids[i + 1] + '" class="svg-edge"';
        if (Math.abs(a.cy - b.cy) < 2) {
          s += '<line x1="' + a.r + '" y1="' + a.cy
            + '" x2="' + b.l + '" y2="' + b.cy
            + '" stroke="' + color + '" stroke-width="4" stroke-opacity="0.7"'
            + ' stroke-linecap="round"' + edgeAttr + '/>';
        } else {
          const mx = (a.r + b.l) / 2;
          const dy = b.cy > a.cy ? 1 : -1;
          const vd = Math.abs(b.cy - a.cy);
          const r = Math.min(6, vd / 2, Math.max(0, mx - a.r) / 2, Math.max(0, b.l - mx) / 2);
          s += '<path d="M' + a.r + ',' + a.cy
            + ' L' + (mx - r) + ',' + a.cy
            + ' Q' + mx + ',' + a.cy + ' ' + mx + ',' + (a.cy + dy * r)
            + ' L' + mx + ',' + (b.cy - dy * r)
            + ' Q' + mx + ',' + b.cy + ' ' + (mx + r) + ',' + b.cy
            + ' L' + b.l + ',' + b.cy
            + '" fill="none" stroke="' + color + '" stroke-width="4" stroke-opacity="0.7"'
            + ' stroke-linecap="round"' + edgeAttr + '/>';
        }
      }
    }

    // 2. Branch connections — orthogonal routing, non-intersecting
    const branches = [];
    for (const n of data.nodes) {
      for (const pid of (n.parent_ids || [])) {
        if (!pos[pid] || !pos[n.id]) continue;
        if (layout.ideaLane[n.id] === layout.ideaLane[pid]) continue;
        branches.push({
          pid: pid, cid: n.id,
          color: IDEA_PALETTE[layout.ideaLane[n.id] % IDEA_PALETTE.length],
        });
      }
    }

    const byParent = {};
    for (const br of branches) {
      if (!byParent[br.pid]) byParent[br.pid] = [];
      byParent[br.pid].push(br);
    }

    const SPACING = 10;
    const CORNER = 6;

    for (const pid of Object.keys(byParent)) {
      const group = byParent[pid];
      const p = pos[pid];
      if (!p) continue;
      // Sort by vertical distance descending — furthest drops first (closest junction)
      group.sort(function(a, b) {
        return Math.abs(pos[b.cid].cy - p.cy) - Math.abs(pos[a.cid].cy - p.cy);
      });

      for (let i = 0; i < group.length; i++) {
        const br = group[i];
        const c = pos[br.cid];
        if (!c) continue;

        const jx = p.r + SPACING * (i + 1);
        const dy = c.cy > p.cy ? 1 : -1;
        const vertDist = Math.abs(c.cy - p.cy);
        const horizAfter = Math.max(0, c.l - jx);
        const r = Math.min(CORNER, vertDist / 2, horizAfter / 2, SPACING * (i + 1) / 2);

        s += '<path d="'
          + 'M' + p.r + ',' + p.cy
          + ' L' + (jx - r) + ',' + p.cy
          + ' Q' + jx + ',' + p.cy + ' ' + jx + ',' + (p.cy + dy * r)
          + ' L' + jx + ',' + (c.cy - dy * r)
          + ' Q' + jx + ',' + c.cy + ' ' + (jx + r) + ',' + c.cy
          + ' L' + c.l + ',' + c.cy
          + '" fill="none" stroke="' + br.color
          + '" stroke-width="3" stroke-opacity="0.7"'
          + ' stroke-linecap="round" stroke-linejoin="round"'
          + ' data-from="' + br.pid + '" data-to="' + br.cid + '" class="svg-edge"/>';
      }
    }

    // 3. Station dots — colored by current mode
    var dotColorMode = (document.getElementById('color-mode') || {}).value || 'status+improve';
    for (const n of data.nodes) {
      if (!pos[n.id]) continue;
      var dotColor = _colorForIdea(n.id, dotColorMode);
      s += '<circle cx="' + pos[n.id].l + '" cy="' + pos[n.id].cy
        + '" r="6" fill="' + dotColor + '" stroke="#0d1117" stroke-width="2.5"'
        + ' data-idea="' + n.id + '" class="svg-dot"/>';
    }

    svg.innerHTML = s;
  }

  // --- Timeline ---

  let _timelineNodes = [];

  function updateTimeline(data) {
    const nodes = data.nodes.filter(n => n.first_start);
    if (!nodes.length) return;
    nodes.sort((a, b) => (a.first_start || '').localeCompare(b.first_start || ''));
    _timelineNodes = nodes;

    const canvas = document.getElementById('timeline-chart');
    const wrapEl = document.getElementById('timeline-wrap');
    const rowH = 36, labelW = 220, padTop = 30, padRight = 20, padBottom = 40;
    const h = padTop + nodes.length * rowH + padBottom;
    wrapEl.style.height = h + 'px';
    canvas.width = wrapEl.clientWidth || 800;
    canvas.height = h;

    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Time range
    const allStarts = nodes.map(n => new Date(n.first_start).getTime());
    const allEnds = nodes.map(n => {
      if (n.last_finish) return new Date(n.last_finish).getTime();
      if (n.has_running) return Date.now();
      return new Date(n.first_start).getTime() + 60000;
    });
    const tMin = Math.min(...allStarts) - 60000;
    const tMax = Math.max(...allEnds) + 60000;
    const chartW = canvas.width - labelW - padRight;

    function tToX(t) { return labelW + (t - tMin) / (tMax - tMin) * chartW; }

    // Draw time axis
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(labelW, h - padBottom);
    ctx.lineTo(canvas.width - padRight, h - padBottom);
    ctx.stroke();

    // Time ticks
    const range = tMax - tMin;
    let tickInterval;
    if (range < 600000) tickInterval = 60000;        // < 10m: every 1m
    else if (range < 3600000) tickInterval = 300000;  // < 1h: every 5m
    else if (range < 86400000) tickInterval = 3600000; // < 1d: every 1h
    else tickInterval = 86400000;                      // every day

    const firstTick = Math.ceil(tMin / tickInterval) * tickInterval;
    ctx.fillStyle = '#8b949e';
    ctx.font = '10px SF Mono, Fira Code, Consolas, monospace';
    ctx.textAlign = 'center';
    for (let t = firstTick; t <= tMax; t += tickInterval) {
      const x = tToX(t);
      ctx.strokeStyle = '#21262d';
      ctx.beginPath();
      ctx.moveTo(x, padTop);
      ctx.lineTo(x, h - padBottom);
      ctx.stroke();

      const d = new Date(t);
      let label;
      if (tickInterval >= 86400000) label = d.toLocaleDateString(undefined, {month:'short', day:'numeric'});
      else label = d.toLocaleTimeString(undefined, {hour:'2-digit', minute:'2-digit'});
      ctx.fillText(label, x, h - padBottom + 16);
    }

    // Draw dependency arrows first (behind bars)
    for (const n of nodes) {
      for (const pid of (n.parent_ids || [])) {
        const fromIdx = nodes.findIndex(p => p.id === pid);
        const toIdx = nodes.indexOf(n);
        if (fromIdx < 0) continue;
        const fromNode = nodes[fromIdx];
        const fromEnd = tToX(fromNode.last_finish ? new Date(fromNode.last_finish).getTime() : Date.now());
        const fromY = padTop + fromIdx * rowH + rowH / 2;
        const toStart = tToX(new Date(n.first_start).getTime());
        const toY = padTop + toIdx * rowH + rowH / 2;

        ctx.save();
        ctx.strokeStyle = '#484f58';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(fromEnd, fromY);
        ctx.lineTo(toStart, toY);
        ctx.stroke();
        const angle = Math.atan2(toY - fromY, toStart - fromEnd);
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.moveTo(toStart, toY);
        ctx.lineTo(toStart - 6 * Math.cos(angle - 0.4), toY - 6 * Math.sin(angle - 0.4));
        ctx.moveTo(toStart, toY);
        ctx.lineTo(toStart - 6 * Math.cos(angle + 0.4), toY - 6 * Math.sin(angle + 0.4));
        ctx.stroke();
        ctx.restore();
      }
    }

    // Draw bars and labels
    for (let i = 0; i < nodes.length; i++) {
      const n = nodes[i];
      const y = padTop + i * rowH;
      const barH = rowH * 0.6;
      const barY = y + (rowH - barH) / 2;
      const start = new Date(n.first_start).getTime();
      const end = n.last_finish ? new Date(n.last_finish).getTime() : (n.has_running ? Date.now() : start + 60000);
      const x1 = tToX(start);
      const x2 = tToX(end);
      const barW = Math.max(x2 - x1, 4);

      const status = n.has_running ? 'running' : n.status;
      const color = STATUS_BAR_COLORS[status] || STATUS_BAR_COLORS.active;

      // Bar
      ctx.fillStyle = color + 'aa';
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.roundRect(x1, barY, barW, barH, 3);
      ctx.fill();
      ctx.stroke();

      // Label
      ctx.fillStyle = '#c9d1d9';
      ctx.font = '11px SF Mono, Fira Code, Consolas, monospace';
      ctx.textAlign = 'right';
      ctx.fillText('#' + n.id + ': ' + truncate(n.description, 25), labelW - 8, y + rowH / 2 + 4);
    }

    // Store node positions for click detection
    canvas._nodes = nodes;
    canvas._rowH = rowH;
    canvas._padTop = padTop;
  }

  // Click handler for timeline canvas
  document.getElementById('timeline-chart').addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const y = e.clientY - rect.top;
    const nodes = this._nodes;
    if (!nodes) return;
    const idx = Math.floor((y - this._padTop) / this._rowH);
    if (idx >= 0 && idx < nodes.length) {
      loadIdeaDetail(nodes[idx].id);
    }
  });

  // --- Backlog ---

  function updateBacklog(data) {
    document.getElementById('stat-ideas').textContent = data.active_ideas ? data.active_ideas.length : 0;
    document.getElementById('stat-running').textContent = data.total_running || 0;
    document.getElementById('stat-pending').textContent = data.total_pending || 0;
    document.getElementById('stat-branch').textContent = data.current_branch || '--';
  }

  // --- Metrics Chart ---

  window.toggleChart = function() {
    chartOpen = !chartOpen;
    const panel = document.getElementById('chart-panel');
    const arrow = document.getElementById('chart-arrow');
    if (chartOpen) {
      panel.classList.remove('collapsed');
      arrow.classList.add('open');
      loadChartData();
    } else {
      panel.classList.add('collapsed');
      arrow.classList.remove('open');
    }
  };

  function loadChartData() {
    fetch('/api/v1/chart-data')
      .then(r => r.json())
      .then(data => {
        allExperiments = data.experiments.concat(data.running);
        _globalBestBefore = {};  // invalidate cache
        // Completed sorted by finish time, running at the end sorted by start time
        allExperiments.sort((a, b) => {
          if (a._running && !b._running) return 1;
          if (!a._running && b._running) return -1;
          const ta = a.finished_at || a.started_at || '';
          const tb = b.finished_at || b.started_at || '';
          return ta.localeCompare(tb);
        });
        populateMetricSelector();
        updateChart();
      })
      .catch(() => {});
  }

  function populateMetricSelector() {
    const metricKeys = new Set();
    const tagSet = new Set();
    for (const exp of allExperiments) {
      if (exp.metrics) { for (const k of Object.keys(exp.metrics)) metricKeys.add(k); }
      if (exp.tags) { for (const t of exp.tags) tagSet.add(t); }
    }
    const select = document.getElementById('metric-select');
    const prev = select.value;
    select.innerHTML = '';
    for (const k of [...metricKeys].sort()) {
      const opt = document.createElement('option');
      opt.value = k; opt.textContent = k; select.appendChild(opt);
    }
    if (prev && metricKeys.has(prev)) {
      select.value = prev;
    } else {
      const preferred = ['accuracy_per_mtoken', 'agent_accuracy', 'accuracy'];
      const match = preferred.find(k => metricKeys.has(k));
      if (match) select.value = match;
    }

    const tagContainer = document.getElementById('tag-filters');
    var tagHtml = 'Tags:';
    if (tagSet.size === 0) {
      tagHtml += ' <span style="color:#484f58;font-size:11px">none</span>';
    } else {
      for (const t of [...tagSet].sort()) {
        var isActive = _activeTagFilters.has(t);
        tagHtml += ' <span class="tag-toggle' + (isActive ? ' active' : '') + '" data-tag="'
          + escapeHtml(t) + '" onclick="toggleTagFilter(this)" oncontextmenu="renameTagPrompt(event, this)">'
          + escapeHtml(t) + '</span>';
      }
    }
    tagContainer.innerHTML = tagHtml;
  }

  let _chartMetricKey = null;

  // Compute the best metric value for each idea's parent ideas
  function _parentBestMetric(ideaId, metricKey) {
    var idea = allIdeas[ideaId];
    if (!idea) return null;
    var pids = idea.parent_ids || [];
    var best = null;
    for (var i = 0; i < pids.length; i++) {
      for (var j = 0; j < allExperiments.length; j++) {
        var e = allExperiments[j];
        if (e.idea_id === pids[i] && e.metrics && e.metrics[metricKey] !== undefined) {
          var v = e.metrics[metricKey];
          if (best === null || v > best) best = v;
        }
      }
    }
    return best;
  }

  var _STATUS_COLORS = { active: '#3fb950', concluded: '#58a6ff', abandoned: '#f85149', running: '#d29922' };

  // Precompute global best-before-this-experiment for a given metric.
  // Returns a map: exp.id → best metric value from all earlier experiments.
  // allExperiments is sorted by finished_at/started_at already.
  var _globalBestBefore = {};  // metricKey → { expId → bestBefore }
  function _computeGlobalBestBefore(metricKey) {
    if (_globalBestBefore[metricKey]) return _globalBestBefore[metricKey];
    // Sort completed experiments by finish time
    var sorted = allExperiments
      .filter(function(e) { return e.metrics && e.metrics[metricKey] !== undefined && !e._running; })
      .slice()
      .sort(function(a, b) {
        return (a.finished_at || a.started_at || '').localeCompare(b.finished_at || b.started_at || '');
      });
    var best = null;
    var map = {};
    for (var i = 0; i < sorted.length; i++) {
      map[sorted[i].id] = best;  // best BEFORE this experiment
      var v = sorted[i].metrics[metricKey];
      if (best === null || v > best) best = v;
    }
    _globalBestBefore[metricKey] = map;
    return map;
  }

  // Also compute per-idea: did any experiment in this idea beat the global
  // best at the time it ran?
  function _ideaHasGlobalImprovement(ideaId, metricKey) {
    var bestBefore = _computeGlobalBestBefore(metricKey);
    for (var j = 0; j < allExperiments.length; j++) {
      var e = allExperiments[j];
      if (e.idea_id !== ideaId || !e.metrics || e.metrics[metricKey] === undefined || e._running) continue;
      var prev = bestBefore[e.id];
      if (prev === null || e.metrics[metricKey] > prev) return true;
    }
    return false;
  }

  function _colorForExp(exp, metricKey, mode) {
    if (mode === 'lane') {
      if (currentLayout && currentLayout.ideaLane[exp.idea_id] !== undefined)
        return IDEA_PALETTE[currentLayout.ideaLane[exp.idea_id] % IDEA_PALETTE.length];
      return '#8b949e';
    }
    if (mode === 'status') {
      return _STATUS_COLORS[exp.idea_status || 'active'] || '#8b949e';
    }
    if (mode === 'status+improve') {
      var base = _STATUS_COLORS[exp.idea_status || 'active'] || '#8b949e';
      if (!exp.metrics || exp.metrics[metricKey] === undefined || exp._running) return base;
      var bestBefore = _computeGlobalBestBefore(metricKey);
      var prev = bestBefore[exp.id];
      if (prev === null || exp.metrics[metricKey] > prev)
        return '#e078f0';  // gold — new global best at time of running
      return base;
    }
    if (mode === 'improvement') {
      if (!exp.metrics || exp.metrics[metricKey] === undefined) return '#8b949e';
      var parentBest = _parentBestMetric(exp.idea_id, metricKey);
      if (parentBest === null) return '#d29922';
      return exp.metrics[metricKey] > parentBest ? '#3fb950' : '#f85149';
    }
    return null; // 'idea' — handled by ideaColorMap
  }

  function _ideaBestMetric(ideaId, metricKey) {
    var best = null;
    for (var j = 0; j < allExperiments.length; j++) {
      var e = allExperiments[j];
      if (e.idea_id === ideaId && e.metrics && e.metrics[metricKey] !== undefined) {
        if (best === null || e.metrics[metricKey] > best) best = e.metrics[metricKey];
      }
    }
    return best;
  }

  function _colorForIdea(ideaId, mode) {
    if (mode === 'lane') {
      if (currentLayout && currentLayout.ideaLane[ideaId] !== undefined)
        return IDEA_PALETTE[currentLayout.ideaLane[ideaId] % IDEA_PALETTE.length];
      return '#8b949e';
    }
    if (mode === 'status') {
      var idea = allIdeas[ideaId];
      var st = idea ? (idea.has_running ? 'running' : idea.status) : 'active';
      return STATUS_BAR_COLORS[st] || '#8b949e';
    }
    if (mode === 'status+improve') {
      var idea = allIdeas[ideaId];
      var st = idea ? (idea.has_running ? 'running' : idea.status) : 'active';
      var base = STATUS_BAR_COLORS[st] || '#8b949e';
      var metricKey = (document.getElementById('metric-select') || {}).value || '';
      if (!metricKey) return base;
      if (_ideaHasGlobalImprovement(ideaId, metricKey)) return '#e078f0'; // purple — set a new global best
      return base;
    }
    if (mode === 'improvement') {
      var metricKey = (document.getElementById('metric-select') || {}).value || '';
      if (!metricKey) return '#8b949e';
      var myBest = _ideaBestMetric(ideaId, metricKey);
      if (myBest === null) return '#8b949e';
      var parentBest = _parentBestMetric(ideaId, metricKey);
      if (parentBest === null) return '#d29922';
      return myBest > parentBest ? '#3fb950' : '#f85149';
    }
    // 'idea' — palette by ID
    return IDEA_PALETTE[(ideaId - 1) % IDEA_PALETTE.length];
  }

  window.toggleTagFilter = function(el) {
    var tag = el.dataset.tag;
    if (_activeTagFilters.has(tag)) {
      _activeTagFilters.delete(tag);
      el.classList.remove('active');
    } else {
      _activeTagFilters.add(tag);
      el.classList.add('active');
    }
    updateChart();
    recolorGraph();
  };

  window.renameTagPrompt = function(evt, el) {
    evt.preventDefault();
    var oldTag = el.dataset.tag;
    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'tag-rename-input';
    input.value = oldTag;
    el.textContent = '';
    el.appendChild(input);
    input.focus();
    input.select();

    function finish() {
      var newTag = input.value.trim();
      if (!newTag || newTag === oldTag) {
        el.textContent = oldTag;
        return;
      }
      el.textContent = '...';
      fetch('/api/v1/experiments/tags/rename', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ old: oldTag, new: newTag }),
      })
        .then(r => r.json())
        .then(data => {
          if (_activeTagFilters.has(oldTag)) {
            _activeTagFilters.delete(oldTag);
            _activeTagFilters.add(newTag);
          }
          loadChartData();
        })
        .catch(() => { el.textContent = oldTag; });
    }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { el.textContent = oldTag; }
    });
    input.addEventListener('blur', finish);
  };

  window.recolorGraph = function() {
    var mode = (document.getElementById('color-mode') || {}).value || 'status+improve';
    var container = document.getElementById('graph');
    if (!container || !currentLayout) return;
    container.querySelectorAll('.subway-station').forEach(function(el) {
      var id = parseInt(el.dataset.id);
      var color = _colorForIdea(id, mode);
      el.style.borderColor = color;
      // Keep lane accent on left if not in lane mode
      if (mode === 'lane') {
        el.style.borderLeftColor = color;
      } else {
        el.style.borderLeftWidth = '2px';
        el.style.borderLeftColor = color;
      }
    });
    // Recolor SVG dots
    var svg = document.getElementById('subway-svg');
    if (svg) {
      svg.querySelectorAll('.svg-dot').forEach(function(el) {
        var id = parseInt(el.getAttribute('data-idea'));
        el.setAttribute('fill', _colorForIdea(id, mode));
      });
    }
  };

  function _buildChartData(metricKey) {
    let filtered = allExperiments.filter(e => e.metrics && e.metrics[metricKey] !== undefined);

    if (_activeTagFilters.size > 0) {
      filtered = filtered.filter(e => e.tags && e.tags.some(t => _activeTagFilters.has(t)));
    }

    if (document.getElementById('improvements-only').checked) {
      let best = -Infinity;
      filtered = filtered.filter(e => {
        const v = e.metrics[metricKey];
        if (v > best) { best = v; return true; }
        return false;
      });
    }

    var colorMode = (document.getElementById('color-mode') || {}).value || 'status+improve';

    // Fallback sequential palette for 'idea' mode
    const ideaColorMap = {};
    let colorIdx = 0;
    for (const exp of filtered) {
      if (!(exp.idea_id in ideaColorMap)) {
        ideaColorMap[exp.idea_id] = IDEA_PALETTE[colorIdx % IDEA_PALETTE.length];
        colorIdx++;
      }
    }

    function getColor(exp) {
      var c = _colorForExp(exp, metricKey, colorMode);
      return c || ideaColorMap[exp.idea_id] || '#8b949e';
    }

    return {
      labels: filtered.map(e => 'exp/' + e.id + (e._running ? ' \u25B6' : '')),
      pointColors: filtered.map(e => getColor(e)),
      pointBgColors: filtered.map(e => e._running ? 'transparent' : getColor(e)),
      pointStyles: filtered.map(e => e._running ? 'triangle' : 'circle'),
      pointRadii: filtered.map(e => e._running ? 8 : 6),
      pointBorderWidths: filtered.map(e => e._running ? 2.5 : 1),
      values: filtered.map(e => e.metrics[metricKey]),
      expData: filtered,
    };
  }

  function _sizeChartContainer(numPoints) {
    var inner = document.getElementById('chart-inner');
    if (!inner) return;
    var minW = Math.max(inner.parentElement.clientWidth, numPoints * 50);
    inner.style.width = minW + 'px';
  }

  function _createChart(metricKey, chartData) {
    _sizeChartContainer(chartData.labels.length);
    const ctx = document.getElementById('metrics-chart').getContext('2d');
    return new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartData.labels,
        datasets: [{
          label: metricKey,
          data: chartData.values,
          borderColor: '#8b949e44',
          pointBackgroundColor: chartData.pointBgColors,
          pointBorderColor: chartData.pointColors,
          pointBorderWidth: chartData.pointBorderWidths,
          pointStyle: chartData.pointStyles,
          pointRadius: chartData.pointRadii,
          pointHoverRadius: 10,
          tension: 0,
          fill: false,
          _expData: chartData.expData,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: { duration: 400 },
        onClick: function(evt, elements) {
          if (elements.length > 0) {
            var idx = elements[0].index;
            var ds = evt.chart.data.datasets[0];
            if (ds && ds._expData && ds._expData[idx]) {
              var ideaId = ds._expData[idx].idea_id;
              if (window._highlightIdea) window._highlightIdea(ideaId);
              // Auto-clear after 3 seconds
              setTimeout(function() { if (window._highlightIdea) window._highlightIdea(null); }, 3000);
            }
          }
        },
        scales: {
          x: {
            display: true,
            ticks: { color: '#8b949e', font: { size: 10, family: 'SF Mono, Fira Code, Consolas, monospace' }, autoSkip: false },
            grid: { color: '#21262d' },
          },
          y: {
            title: { display: true, text: metricKey, color: '#8b949e', font: { size: 10 } },
            ticks: { color: '#484f58', font: { size: 10 } },
            grid: { color: '#21262d' },
          },
        },
        onHover: function(evt, elements) {
          if (elements.length > 0) {
            var idx = elements[0].index;
            var ds = evt.chart.data.datasets[0];
            if (ds && ds._expData && ds._expData[idx]) {
              if (window._highlightIdea) window._highlightIdea(ds._expData[idx].idea_id);
            }
          } else {
            if (window._highlightIdea) window._highlightIdea(null);
          }
        },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#161b22', titleColor: '#58a6ff', bodyColor: '#c9d1d9',
            borderColor: '#30363d', borderWidth: 1,
            titleFont: { family: 'SF Mono, Fira Code, Consolas, monospace', size: 11 },
            bodyFont: { family: 'SF Mono, Fira Code, Consolas, monospace', size: 11 },
            callbacks: {
              title: function(items) {
                const d = items[0].dataset._expData[items[0].dataIndex];
                return 'idea #' + d.idea_id + ': ' + ((allIdeas[d.idea_id] || {}).description || d.idea_description || '');
              },
              label: function(item) {
                const mk = item.dataset.label;
                const d = item.dataset._expData[item.dataIndex];
                return [
                  mk + ': ' + item.raw,
                  'exp/' + d.id + ': ' + (d.description || ''),
                  d._running ? '\u25B6 running (from progress)' : '',
                  d.runtime ? 'runtime: ' + d.runtime : '',
                  d.finished_at ? 'at ' + new Date(d.finished_at).toLocaleString() : '',
                ].filter(Boolean);
              },
            },
          },
        },
      },
    });
  }

  window.updateChart = function() {
    const metricKey = document.getElementById('metric-select').value;
    if (!metricKey) return;

    const chartData = _buildChartData(metricKey);

    // If chart exists and same metric key, update in-place (no flicker)
    if (metricsChart && _chartMetricKey === metricKey) {
      _sizeChartContainer(chartData.labels.length);
      const ds = metricsChart.data.datasets[0];
      ds.data = chartData.values;
      ds.pointBackgroundColor = chartData.pointBgColors;
      ds.pointBorderColor = chartData.pointColors;
      ds.pointBorderWidth = chartData.pointBorderWidths;
      ds.pointStyle = chartData.pointStyles;
      ds.pointRadius = chartData.pointRadii;
      ds._expData = chartData.expData;
      metricsChart.data.labels = chartData.labels;
      metricsChart.resize();
      metricsChart.update('none');
      return;
    }

    // Different metric or first render — (re)create chart
    if (metricsChart) metricsChart.destroy();
    _chartMetricKey = metricKey;
    metricsChart = _createChart(metricKey, chartData);
  };

  // --- Detail panel ---

  function badgeFor(status) { return '<span class="badge badge-' + status + '">' + status + '</span>'; }

  function escapeHtml(s) {
    if (!s) return '';
    const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
  }

  function formatTime(iso) {
    if (!iso) return '--';
    try { return new Date(iso).toLocaleString(); } catch(e) { return iso; }
  }

  function loadIdeaDetail(ideaId) {
    selectedIdea = ideaId;
    fetch('/api/v1/ideas/' + ideaId + '?notes=all')
      .then(r => r.json())
      .then(idea => renderDetail(idea))
      .catch(err => {
        document.getElementById('detail-content').innerHTML = '<p style="color:#f85149">Error: ' + escapeHtml(String(err)) + '</p>';
      });
    document.getElementById('detail-panel').classList.add('open');
  }

  function renderDetail(idea) {
    const notes = (idea.notes || []).sort((a, b) => (a.created_at || '').localeCompare(b.created_at || ''));
    const experiments = idea.experiments || [];

    let html = '<h2>Idea #' + idea.id + ' <span class="close-btn" onclick="closePanel()">&times;</span></h2>';
    html += '<div class="detail-section"><div class="label">Status</div><div class="value">' + badgeFor(idea.status) + '</div></div>';
    html += '<div class="detail-section"><div class="label">Description</div><div class="value">' + escapeHtml(idea.description) + '</div></div>';
    if (idea.conclusion) {
      html += '<div class="detail-section"><div class="label">Conclusion</div><div class="value">' + escapeHtml(idea.conclusion) + '</div></div>';
    }
    html += '<div class="detail-section"><div class="label">Branch</div><div class="value">' + escapeHtml(idea.branch) + '</div></div>';
    html += '<div class="detail-section"><div class="label">Created</div><div class="value">' + formatTime(idea.created_at) + '</div></div>';

    if (notes.length) {
      html += '<div class="detail-section"><div class="label">Notes (' + notes.length + ')</div>';
      for (const n of notes) {
        html += '<div class="note-item ' + (n.level || 'observation') + '">';
        html += '<div class="note-meta">' + escapeHtml(n.level) + ' &mdash; ' + formatTime(n.created_at) + '</div>';
        html += escapeHtml(n.text);
        html += '</div>';
      }
      html += '</div>';
    }

    if (experiments.length) {
      html += '<div class="detail-section"><div class="label">Experiments (' + experiments.length + ')</div>';
      for (const e of experiments) {
        html += '<div class="exp-item">';
        html += '<div class="exp-header"><span class="exp-id">exp/' + e.id + '</span>' + badgeFor(e.status) + '</div>';
        html += '<div class="exp-desc">' + escapeHtml(e.description) + '</div>';
        if (e.tags && e.tags.length) {
          html += '<div>';
          for (var ti = 0; ti < e.tags.length; ti++) html += '<span class="tag-pill">' + escapeHtml(e.tags[ti]) + '</span>';
          html += '</div>';
        }
        if (e.status === 'running') {
          html += '<div class="exp-progress" id="progress-' + e.id + '">loading progress...</div>';
        }
        if (e.metrics && Object.keys(e.metrics).length) {
          html += '<div class="exp-metrics">metrics: ' + escapeHtml(JSON.stringify(e.metrics)) + '</div>';
        }
        if (e.meta && Object.keys(e.meta).length) {
          html += '<div class="exp-meta">meta: ' + escapeHtml(JSON.stringify(e.meta)) + '</div>';
        }
        html += '<div class="exp-timestamps">';
        html += 'created: ' + formatTime(e.created_at);
        if (e.started_at) html += ' | started: ' + formatTime(e.started_at);
        if (e.finished_at) html += ' | finished: ' + formatTime(e.finished_at);
        if (e.runtime) html += ' | runtime: ' + e.runtime;
        html += '</div></div>';
      }
      html += '</div>';
    }

    document.getElementById('detail-content').innerHTML = html;

    // Fetch progress for running experiments
    const runningIds = experiments.filter(e => e.status === 'running').map(e => e.id);
    runningIds.forEach(fetchProgress);
    startProgressPolling(runningIds);
  }

  function fetchProgress(expId) {
    const el = document.getElementById('progress-' + expId);
    if (!el) return;
    fetch('/api/v1/experiments/' + expId + '/progress')
      .then(r => r.json())
      .then(data => {
        if (!document.getElementById('progress-' + expId)) return;
        if (!data.progress) {
          el.textContent = 'running (no progress reported yet)';
          return;
        }
        const p = data.progress;
        let parts = [];
        for (const [k, v] of Object.entries(p)) {
          parts.push(escapeHtml(k) + ': <b>' + escapeHtml(String(v)) + '</b>');
        }
        let html = parts.join(' &middot; ');
        // Show a progress bar if there's a percentage-like field
        const pct = p.percent ?? p.pct ?? p.progress ?? (p.epoch && p.total_epochs ? Math.round(100 * p.epoch / p.total_epochs) : null);
        if (pct !== null && pct !== undefined && typeof pct === 'number') {
          html += '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.min(100, Math.max(0, pct)) + '%"></div></div>';
        }
        el.innerHTML = html;
      })
      .catch(() => {
        if (el) el.textContent = 'running';
      });
  }

  let _progressInterval = null;
  function startProgressPolling(expIds) {
    stopProgressPolling();
    if (!expIds.length) return;
    _progressInterval = setInterval(function() {
      // Stop if panel closed or no running experiments visible
      const anyVisible = expIds.some(id => document.getElementById('progress-' + id));
      if (!anyVisible) { stopProgressPolling(); return; }
      expIds.forEach(fetchProgress);
    }, 3000);
  }
  function stopProgressPolling() {
    if (_progressInterval) { clearInterval(_progressInterval); _progressInterval = null; }
  }

  window.closePanel = function() {
    stopProgressPolling();
    document.getElementById('detail-panel').classList.remove('open');
    selectedIdea = null;
  };

  // --- Log view ---

  let logEntries = [];

  function loadLog() {
    fetch('/api/v1/ideas')
      .then(r => r.json())
      .then(ideas => {
        const promises = ideas.map(idea =>
          fetch('/api/v1/ideas/' + idea.id + '?notes=all')
            .then(r => r.json())
            .then(full => ({ idea: full, experiments: full.experiments || [], notes: full.notes || [] }))
        );
        return Promise.all(promises);
      })
      .then(results => {
        logEntries = [];
        for (const { idea, experiments, notes } of results) {
          // Idea created
          logEntries.push({
            type: 'idea',
            time: idea.created_at,
            ideaId: idea.id,
            title: 'Idea #' + idea.id + ' created',
            body: idea.description,
            status: idea.status,
            extra: idea.conclusion ? 'Conclusion: ' + idea.conclusion : '',
          });

          // Experiments
          for (const e of experiments) {
            const t = e.finished_at || e.started_at || e.created_at;
            logEntries.push({
              type: 'experiment',
              time: t,
              ideaId: idea.id,
              title: 'exp/' + e.id + (e.status === 'completed' ? ' completed' : e.status === 'failed' ? ' failed' : e.status === 'running' ? ' running' : ' ' + e.status),
              body: e.description,
              status: e.status,
              metrics: e.metrics,
              runtime: e.runtime,
            });
          }

          // Notes
          for (const n of notes) {
            logEntries.push({
              type: 'note-' + (n.level || 'observation'),
              time: n.created_at,
              ideaId: idea.id,
              title: (n.level || 'observation'),
              body: n.text,
